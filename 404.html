<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGE NOT FOUND | URBAN SKETCH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css?v=3">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        body { 
            overflow: hidden;
        }
        .status-viewport {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .status-content {
            text-align: center;
            max-width: 800px;
            width: 90%;
            z-index: 5;
            position: relative;
        }
        .massive-code {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(8rem, 30vw, 20rem);
            font-weight: 900;
            line-height: 1;
            color: var(--text-main);
            opacity: 0.03;
            user-select: none;
            z-index: 1;
        }
        .status-icon {
            font-size: clamp(3rem, 10vw, 5rem);
            color: var(--accent);
            margin-bottom: 2rem;
            display: inline-block;
            animation: pulse-gear 2s infinite ease-in-out;
            position: relative;
            z-index: 6;
        }
        @keyframes pulse-gear {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px rgba(var(--accent-rgb), 0.5); }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(230, 29, 63, 0.05) 0%, transparent 70%);
            z-index: 1;
        }
        .h1-status {
            color: var(--text-main);
            position: relative;
            z-index: 6;
        }
    </style>
</head>
<body class="bg-color">

    <div class="status-viewport">
        <div class="massive-code">404</div>
        <div class="bg-glow"></div>
        <div class="grid-overlay opacity-25"></div>
        
        <div class="status-content reveal-up active">
            <div class="status-icon">
                <i class="bi bi-map"></i>
            </div>
            
            <h1 class="display-3 fw-800 mb-4 ls-tight h1-status">Lost in the <span class="text-accent">City</span></h1>
            <p class="body-large text-muted mb-5 mx-auto" style="max-width: 600px;">We couldn't find the page you're looking for. It may have been moved or the URL is incorrect. Let's get you back on track.</p>
            
            <div class="mt-5">
                <a href="index.html" class="btn btn-accent px-5 py-4 rounded-pill fw-800 h5 mb-0 shadow-lg shadow-accent-25">BACK TO HOME</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
